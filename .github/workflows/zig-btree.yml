name: zig_btree

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ZIG_VERSION: 0.16.0
      ZIG: ../.toolchains/zig-x86_64-linux-0.16.0/zig
      BENCH_RUNS: 3

    defaults:
      run:
        working-directory: zig_btree

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl g++ libabsl-dev python3 xz-utils

      - name: Download pinned Zig toolchain
        run: |
          mkdir -p ../.toolchains
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" \
            -o "../.toolchains/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          tar -C ../.toolchains -xf "../.toolchains/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          "${ZIG}" version

      - name: Run unit tests
        run: '"${ZIG}" build unit-test'

      - name: Run stress tests
        run: '"${ZIG}" build stress-test'

      - name: Run benchmark parser tests
        run: python3 -m unittest tools.compare_bench

      - name: Build C++ Abseil btree benchmark
        run: |
          g++ -O3 -DNDEBUG -std=c++17 \
            bench/abseil_btree_bench.cc \
            -o ../.toolchains/abseil_btree_bench

      - name: Run Zig benchmark
        run: |
          set -o pipefail
          : > zig-btree-bench.txt
          for i in $(seq 1 "${BENCH_RUNS}"); do
            echo "### Zig run ${i}" | tee -a zig-btree-bench.txt
            "${ZIG}" build -Doptimize=ReleaseFast bench 2>&1 | tee -a zig-btree-bench.txt
          done

      - name: Run C++ Abseil btree benchmark
        run: |
          set -o pipefail
          : > cpp-abseil-btree-bench.txt
          for i in $(seq 1 "${BENCH_RUNS}"); do
            echo "### C++ Abseil btree run ${i}" | tee -a cpp-abseil-btree-bench.txt
            ../.toolchains/abseil_btree_bench | tee -a cpp-abseil-btree-bench.txt
          done

      - name: Compare benchmark output
        run: |
          python3 tools/compare_bench.py \
            --zig zig-btree-bench.txt \
            --abseil cpp-abseil-btree-bench.txt \
            --runs "${BENCH_RUNS}" \
            --output benchmark-summary.md

      - name: Upload benchmark logs
        uses: actions/upload-artifact@v7.0.1
        with:
          name: zig-btree-vs-abseil-btree-bench
          path: |
            zig_btree/zig-btree-bench.txt
            zig_btree/cpp-abseil-btree-bench.txt
            zig_btree/benchmark-summary.md
